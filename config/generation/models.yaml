# Model Configuration for Ebook Generation
# ===========================================
# This is the SOURCE OF TRUTH for model selection.
# API keys are stored in .env (secrets only)
#
# Supported Providers:
#   - openrouter: Unified API for multiple models (OpenRouter.ai)
#   - gemini: Google Gemini Direct API (AI Studio)
#   - comfy: Local ComfyUI (workflow-based, 100% free, requires GPU)
#   - diffusers: Local HuggingFace diffusers (SDXL + LoRA)
#   - fake: Placeholder images with Pillow (instant, zero cost, for UI testing)
#
# Configuration per image type (cover, coloring_page)

models:
  # ========================================
  # COVER GENERATION
  # ========================================
  cover:
    # --- ACTIVE: Fake provider for local testing ---
    provider: fake
    model: fake-cover

    # --- ComfyUI (FREE, best quality, requires GPU) ---
    #provider: comfy
    #model: cover-page-workflow-flux-2.json

    # --- Gemini Direct (free tier, requires GEMINI_API_KEY) ---
    #provider: gemini
    #model: gemini-2.5-flash-image

    # --- OpenRouter ($0.04/image) ---
    #provider: openrouter
    #model: google/gemini-2.5-flash-image-preview

  # ========================================
  # EDITING PAGE
  # ========================================
  editing_page:
    provider: fake
    model: fake-edit

    #provider: comfy
    #model: image_flux2_klein_image_edit_9b_distilled.json

  # ========================================
  # CONTENT PAGE GENERATION (Coloring Pages)
  # ========================================
  coloring_page:
    # --- ACTIVE: Fake provider for local testing ---
    provider: fake
    model: fake-page

    # --- ComfyUI (FREE, best quality, requires GPU) ---
    #provider: comfy
    #model: coloring-page-workflow-flux-2.json

    # --- Gemini Direct (free tier) ---
    #provider: gemini
    #model: gemini-2.5-flash-image

    # --- Diffusers SDXL + LoRA (FREE, local GPU) ---
    #provider: diffusers
    #model: "stabilityai/stable-diffusion-xl-base-1.0"
    #lora: "config/generation/loras/ColoringBookRedmond-ColoringBook-ColoringBookAF.safetensors"
    #lora_weight: 0.8


# ========================================
# QUICK SWITCH GUIDE
# ========================================
#
# To switch providers, comment out the active block and uncomment the desired one.
#
# 1. Local testing (no API, no GPU):
#    All: provider=fake
#
# 2. ComfyUI (free, needs GPU on localhost:8188):
#    cover: provider=comfy, model=cover-page-workflow-flux-2.json
#    coloring_page: provider=comfy, model=coloring-page-workflow-flux-2.json
#    editing_page: provider=comfy, model=image_flux2_klein_image_edit_9b_distilled.json
#
# 3. Gemini Direct (free tier, requires GEMINI_API_KEY):
#    All: provider=gemini, model=gemini-2.5-flash-image
#
# 4. OpenRouter (pay-per-use, requires OPENROUTER_API_KEY):
#    All: provider=openrouter, model=google/gemini-2.5-flash-image-preview
