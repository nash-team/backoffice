id: christmas-cute
label: "Christmas Cute"

palette:
  base: ["#c81d25", "#0f6d45", "#f6d365", "#fff9f0"]
  accents_allowed: ["#ff9fb2", "#4ac0ff", "#ffe066", "#f28d35"]
  forbidden_keywords: ["gothic", "spooky", "horror", "creepy", "grunge", "dark eerie", "drab", "muddy tones"]

# ==========================================
# COVER TEMPLATES (colorful, full-bleed)
# ==========================================
cover_templates:
  default:
    prompt_blocks:
      subject: "an adorable Christmas character (smiling Santa, cheerful reindeer calf, playful elf, cuddly snowman), centered, big friendly eyes"
      environment: "cozy snowy village with twinkling lights, gingerbread house street, toy workshop with warm fireplace, sparkling pine forest"
      tone: "joyful, magical, heartwarming, soft and bright, kid-friendly holiday cheer"
      positives:
        - "high detail"
        - "bright festive colors"
        - "soft lighting"
        - "glossy finish"
        - "professional children's book cover"
        - "Amazon bestseller look"
        - "warm and inviting"
        - "charming expressions"
      negatives:
        - "no text"
        - "no mockup"
        - "no borders"
        - "no open book"
        - "no spooky"
        - "no horror"
        - "no grunge"
        - "no dull colors"

  "comfy":
    prompt: "Bright joyful Christmas cover: cute festive character in a cozy snowy village with lights and gifts. Soft glow, cheerful colors, professional children's book quality."

    workflow_params:
      "47": "text, mockup, borders, spooky, horror, grunge, dull colors"
      "clip_g_suffix": "cheerful holiday, soft glow, polished illustration, professional quality"

# ==========================================
# SHARED DEFINITIONS (anchors for reuse)
# ==========================================

# Shared variables for all coloring page templates
_shared_variables: &shared_variables
  SHOT:
    - "close-up"
    - "medium shot"
    - "wide shot"
    - "full scene"

  CHARACTER:
    - "smiling chubby Santa"
    - "smiling chubby lady Santa"
    - "cheerful baby reindeer"
    - "cheerful reindeer"
    - "playful elf on the shelf"
    - "cuddly snowman"
    - "cute polar bear with scarf and mittens"
    - "gingerbread kid"
    - "gingerbread adult"
    - "penguin with scarf"
    - "mouse in a stocking"
    - "kid in winter outfit with christmas sweater"
    - "girl in winter outfit with christmas sweater"
    - "boy in winter outfit with christmas sweater"
    - "christmas sweater"
    - "cute granny knitting christmas stocking"
    - "friendly nutcracker soldier"
    - "pretty and cute sugarplum fairy"
    - "pretty and gracious ballet dancer"
    - "ice skaters in winter outfits"
    - "lady ice skater in winter outfits"
    - "lad ice skater in winter outfits"
    - "group of kids caroling happily"
    - "cute grandpa looking toymaker"
    - "little figures skiing and ice skating"
    - "savory yule log with plenty of icing and cute small character skiing on it"
    - "christmas pastries"

  ACTION:
    - "decorating a Christmas tree"
    - "preparing Santa sleigh"
    - "building a snowman"
    - "wrapping presents"
    - "delivering gifts"
    - "singing carols"
    - "sledding down a hill"
    - "baking cookies"
    - "hanging ornaments"
    - "playing with toys"
    - "having a cup of hot cocoa"
    - "having a snowfight"
    - "preparing a hot cocoa"
    - "skiing"
    - "ice skating"
    - "adding frosting to a yule log"
    - "reading christmas stories by the fire"
    - "building wooden toys"
    - "painting wooden toys"
    - "grooming reindeers for christmas"
    - "building a gingerbread house"

  ENV:
    - "cozy living room with fireplace and stockings"
    - "snowy village square with frozen fountain"
    - "gingerbread house kitchen"
    - "cozy kitchen with window overlooking a snowy street"
    - "toy workshop full of toys and wrapped gifts"
    - "sparkling pine forest under the moon and stars"
    - "snowy rooftop with stars"
    - "sky full of stars and shooting stars"
    - "ice skating pond with a pretty bridge"
    - "warm cabin doorway"
    - "santa's cute and cozy headquarters"
    - "christmas vibe living room with cozy furnitures"
    - "city hall square with a frozen fountain"
    - "snowy street decorated for christmas with lightpoles"
    - "Santa's super modern sleigh"
    - "Santa's beautiful wooden sleigh"
    - "warm cabin living room with snowfall outside"
    - "warm cabin kitchen with snowfall outside"
    - "nutcracker soldier beautiful palace headquarters"
    - "Sugarplum fairy christmas observatory"
    - "polar bear ice cozy home"
    - "penguin ice cute cozy home"
    - "enchanted snowy forest"
    - "whimsical snowy meadow"

  FOCUS:
    - "head with festive hat"
    - "full body"
    - "holding gift or ornament"
    - "group of friends"
    - "animal buddies"
    - "decorating hands visible"

  COMPOSITION:
    - "left-facing"
    - "right-facing"
    - "front view"
    - "3/4 view"
    - "jumping or sliding"
    - "waving at viewer"

# Shared quality settings
_shared_quality_settings: &shared_quality_settings |
  Black and white line art coloring page style.
  ONLY black lines on white background. NO colors. NO gray shading.
  Bold clean outlines, closed shapes, thick black lines.
  NO FRAME, NO BORDER around the illustration.
  Illustration touches or nearly touches edges naturally.
  Printable 300 DPI, simple-to-medium detail (kids 4-8).
  No text, no logo, no watermark.

# ==========================================
# COLORING PAGE TEMPLATES (B&W line art)
# ==========================================
coloring_page_templates:
  default:
    base_structure: "Line art coloring page of a {CHARACTER} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings

  "comfy":
    base_structure: "Line art coloring page of a {CHARACTER} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings

    workflow_params:
      "47": "color, shading, text, watermark, spooky, horror, grunge"
      "clip_g_suffix": "clean outlines, cheerful holiday tone, professional line art"
      "qwen_prompt": "Black and white lineart with bold outlines, cute joyful Christmas mood"
