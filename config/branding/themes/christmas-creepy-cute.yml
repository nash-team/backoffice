# Shared quality settings (legacy fallback)
_shared_quality_settings: &shared_quality_settings |
  Black and white line art coloring page style.
  ONLY black lines on white background. NO colors. NO gray shading.
  Bold clean outlines, closed shapes, thick black lines.
  NO FRAME, NO BORDER around the illustration.
  Illustration touches or nearly touches edges naturally.
  Printable 300 DPI, simple-to-medium detail (kids 4-8).
  No text, no logo, no watermark.

# Audience-specific quality profiles
_quality_children: &quality_children
  prefix: |
    Children's coloring book page, clean black and white line art.
    Single main character centered:
  suffix: |
    Very simple face, no inner textures, no shading, no skeleton or internal anatomy visible.
    {SECONDARY_ELEMENTS}
    Background: minimal details, large open spaces for easy coloring.
    Thick bold outlines, uniform line weight.
    Clear closed shapes for easy coloring.
    No cross-hatching, no gradients, no background clutter.
    High contrast, printable coloring book style.
    ONLY black lines on white background. NO colors. NO gray shading.
    No text, no logo, no watermark.
    Kid-friendly, ages 4-7.

_quality_adults: &quality_adults
  prefix: |
    Adult coloring book page, detailed black and white line art.
    Main subject centered:
  suffix: |
    {SECONDARY_ELEMENTS}
    Intricate patterns and fine line details welcome.
    Varied line weights for depth and visual interest.
    Background can include decorative patterns and textures (in line art only).
    Cross-hatching and line textures allowed for shading effects.
    Complex shapes with smaller areas to color.
    High contrast, printable coloring book style.
    ONLY black lines on white background. NO colors. NO gray shading.
    No text, no logo, no watermark.
    Sophisticated aesthetic for adults.

# ==========================================
# COLORING PAGE TEMPLATES (B&W line art)
# ==========================================
coloring_page_templates:
  default:
    base_structure: "a {CHARACTER} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_species_profiles

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens) - template variables are NOT expanded
    # The strategy will use this prompt directly instead of building from base_structure
    prompt: "Black and white line art coloring page, cute creepy Christmas character, skeleton Santa or zombie elf, bold clean outlines, simple shapes, thick black lines on white background, no shading, printable"
    workflow_params:
      negative_prompt: "color, grayscale, shading, gradient, gray, background texture, text, watermark, logo, gore, blood, frightening horror"
      guidance_scale: "9.0"
      steps: "35"

  comfy:
    base_structure: "a {CHARACTER} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_species_profiles

    workflow_params:
      "47": "color, shading, text, watermark, gore, blood, frightening"
      "clip_g_suffix": "professional line art, clean outlines, cute but creepy"
      "qwen_prompt": "Clean black and white lineart with bold outlines"
