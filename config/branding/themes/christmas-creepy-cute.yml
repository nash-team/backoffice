id: christmas-creepy-cute
label: "Christmas Creepy But Cute"

palette:
  base: ["#8b2f2f", "#16412a", "#2d2d2d", "#fff9f0"]
  accents_allowed: ["#d45500", "#d4a017", "#ff9a56", "#ffd700"]
  forbidden_keywords: ["rainbow", "pastel", "neon", "hyper-saturated", "gradient", "cold blue", "icy"]

# ==========================================
# COVER TEMPLATES (colorful, full-bleed)
# ==========================================
cover_templates:
  default:
    prompt_blocks:
      subject: "a cute creepy Christmas Santa creature (friendly skeleton Santa, sweet zombie reindeer, tiny vampire elf, or smiling ghost snowman), centered, expressive eyes, soft spooky aesthetic"
      environment: "cozy haunted Christmas village with warm lanterns, snowy graveyard with glowing ornaments, inviting toy workshop with fireplace, moonlit fo
      rest with twinkling lights and candles"
      tone: "cozy dark, whimsical creepy, Tim Burton inspired, adorable gothic, child-friendly spooky, warm candlelight ambiance, inviting haunted charm"
      positives:
        - "high detail"
        - "cute but creepy balance"
        - "festive gothic style"
        - "soft warm shadows"
        - "warm candlelight glow"
        - "cozy atmosphere"
        - "inviting despite spooky"
        - "professional children's book cover"
        - "Amazon bestseller look"
        - "glossy illustration"
      negatives:
        - "no text"
        - "no borders"
        - "no mockup"
        - "no open book"
        - "no gore"
        - "no blood"
        - "no frightening horror"
        - "no sharp teeth"


  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Vibrant children's book cover, cute creepy Christmas creature, skeleton Santa or zombie reindeer, Tim Burton style, festive gothic, warm candlelight glow, professional glossy illustration, high detail"
    workflow_params:
      negative_prompt: "text, mockup, border, gore, blood, frightening horror, sharp teeth, low quality, watermark"
      guidance_scale: "7.0"
      steps: "25"

  "comfy":
    prompt: "Vibrant children's book cover: cute creepy Christmas creature in cozy haunted village. Tim Burton style, gothic festive, warm candlelight, professional."

    workflow_params:
      "47": "text, mockup, borders, gore, blood, frightening horror, sharp teeth"
      "clip_g_suffix": "cute but creepy, festive gothic, warm shadows, glossy, professional quality"

