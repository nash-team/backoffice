id: unicorns
label: "Unicorns"

palette:
  base: ["#ffffff", "#ffe8fb"]
  accents_allowed: ["rainbow", "sparkles", "stars"]
  forbidden_keywords: []

cover_title_image: "config/branding/themes/assets/unicorns/cover_title.png"
cover_footer_image: "config/branding/assets/cover_footer.png"

# ==========================================
# COVER TEMPLATES (colorful, full-bleed)
# ==========================================
cover_templates:
  default:
    prompt_blocks:
      subject: "a cute magical unicorn with rainbow mane and sparkling wings, centered composition, expressive eyes, friendly face"
      environment: "enchanted landscape, soft clouds, butterflies, magical sparkles"
      tone: "whimsical, joyful, magical, warm inviting colors, professional children's book quality"
      positives:
        - "high detail"
        - "bright saturated colors"
        - "glossy illustration"
        - "professional children's book cover"
        - "Amazon bestseller look"
        - "warm lighting"
        - "magical atmosphere"
      negatives:
        - "no text"
        - "no borders"
        - "no mockup"
        - "no open book"
        - "no scary"

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Vibrant children's book cover, cute magical unicorn with rainbow mane, enchanted landscape, soft clouds, professional glossy illustration, kid-friendly, high detail"
    workflow_params:
      negative_prompt: "text, mockup, border, scary, dark, low quality, watermark"
      guidance_scale: "7.0"
      steps: "25"

  "comfy":
    prompt: "Vibrant children's book cover: cute magical unicorn with rainbow mane in enchanted landscape with soft clouds. Professional, glossy, whimsical, magical, without text, no letters, no words."

    workflow_params:
      "clip_g_suffix": "bright saturated colors, professional children's book, glossy, high quality, magical whimsical"

# ==========================================
# SHARED DEFINITIONS (anchors for reuse)
# ==========================================

# Shared variables for all coloring page templates
_shared_variables: &shared_variables
  SHOT:
    - "close-up"
    - "medium shot"
    - "wide shot"
    - "magical scene"
    - "dreamy portrait"

  UNICORN:
    - "cute magical unicorn"
    - "unicorn with rainbow mane"
    - "unicorn with sparkling wings"
    - "baby unicorn with tiny wings"
    - "baby unicorn"
    - "elegant unicorn"
    - "playful unicorn"
    - "chubby unicorn"
    - "sleepy unicorn"
    - "curly mane unicorn"
    - "forest unicorn with flower crown"
    - "sky unicorn with cloud-like mane"
    - "water unicorn with flowing mane"
    - "snow unicorn with fluffy coat"
    - "rainbow unicorn"

  # All possible actions (filtered per character via character_profiles)
  ACTION:
    # Ground actions (all unicorns)
    - "prancing"
    - "playing"
    - "resting"
    - "dancing"
    - "jumping over rainbow"
    - "spreading sparkles"
    - "galloping"
    - "nuzzling flowers"
    - "sleeping peacefully"
    - "eating grass"
    - "eating apples"
    - "exploring happily"
    - "making friends"
    - "watching butterflies"
    # Flying actions (winged unicorns only)
    - "flying gracefully"
    - "soaring through clouds"
    - "gliding over rainbow"

  ENV:
    - "enchanted landscape"
    - "soft clouds"
    - "magical meadow"
    - "starry sky"
    - "flower garden"
    - "rainbow bridge"
    - "crystal castle background"
    - "snowy landscape"
    - "whimsical ice castle"
    - "snowy mountain"
    - "green plains and valleys"
    - "beautiful meadows"
    - "wild orchard"
    - "fairy forest clearing"
    - "mushroom village"
    - "northern lights sky"
    - "peaceful lake shore"
    - "cherry blossom garden"

  FOCUS:
    - "centered in frame"
    - "full body visible"
    - "with butterflies"
    - "with stars around"
    - "with flowers nearby"
    - "with forest friends"
    - "with fairy companions"
    - "with rainbow in background"
    - "with sparkles all around"

  COMPOSITION:
    - "left-facing"
    - "right-facing"
    - "front"
    - "3/4 view"
    - "jumping"

  SECONDARY_ELEMENTS:
    - "Surrounded by 2-3 small butterflies and magical sparkles."
    - "A few floating stars and rainbow wisps."
    - "Scattered flowers and glowing fireflies."
    - "Tiny mushrooms and clover patches nearby."
    - "Floating hearts and sparkle trails."
    - "A small rainbow arcing in the corner."
    - "Puffy clouds drifting peacefully."
    - ""  # Sometimes no secondary elements

# Character profiles - semantic constraints
# Prevents incoherent combos like "baby unicorn flying" (no wings!)
_shared_character_profiles: &shared_character_profiles
  # Winged unicorns - CAN fly
  "unicorn with sparkling wings":
    actions: ["prancing", "flying gracefully", "soaring through clouds", "gliding over rainbow", "playing", "resting", "dancing", "jumping over rainbow", "spreading sparkles", "galloping"]
    environments: ["enchanted landscape", "soft clouds", "magical meadow", "starry sky", "flower garden", "rainbow bridge", "crystal castle background", "northern lights sky"]

  "baby unicorn with tiny wings":
    actions: ["playing", "resting", "flying gracefully", "spreading sparkles", "prancing"]
    environments: ["soft clouds", "magical meadow", "flower garden", "enchanted landscape"]

  "sky unicorn with cloud-like mane":
    actions: ["flying gracefully", "soaring through clouds", "gliding over rainbow", "prancing", "resting", "spreading sparkles"]
    environments: ["soft clouds", "starry sky", "northern lights sky", "rainbow bridge"]

  # Regular unicorns - CANNOT fly (no wings)
  "cute magical unicorn":
    actions: ["prancing", "playing", "resting", "dancing", "jumping over rainbow", "spreading sparkles", "galloping", "nuzzling flowers", "making friends"]
    environments: ["enchanted landscape", "magical meadow", "flower garden", "rainbow bridge", "crystal castle background", "cherry blossom garden"]

  "unicorn with rainbow mane":
    actions: ["prancing", "playing", "resting", "dancing", "jumping over rainbow", "spreading sparkles", "galloping", "nuzzling flowers"]
    environments: ["enchanted landscape", "magical meadow", "flower garden", "rainbow bridge", "crystal castle background"]

  "rainbow unicorn":
    actions: ["prancing", "playing", "dancing", "jumping over rainbow", "spreading sparkles", "galloping"]
    environments: ["enchanted landscape", "magical meadow", "rainbow bridge", "flower garden"]

  "baby unicorn":
    actions: ["playing", "resting", "nuzzling flowers", "prancing", "sleeping peacefully", "watching butterflies"]
    environments: ["magical meadow", "flower garden", "enchanted landscape", "cherry blossom garden"]

  "elegant unicorn":
    actions: ["prancing", "resting", "dancing", "galloping", "spreading sparkles"]
    environments: ["enchanted landscape", "magical meadow", "crystal castle background", "rainbow bridge"]

  "playful unicorn":
    actions: ["prancing", "playing", "jumping over rainbow", "galloping", "nuzzling flowers", "spreading sparkles", "making friends"]
    environments: ["magical meadow", "flower garden", "enchanted landscape", "rainbow bridge", "wild orchard"]

  "chubby unicorn":
    actions: ["eating grass", "eating apples", "resting", "sleeping peacefully", "prancing", "playing"]
    environments: ["magical meadow", "wild orchard", "flower garden", "green plains and valleys"]

  "sleepy unicorn":
    actions: ["sleeping peacefully", "resting", "nuzzling flowers", "prancing"]
    environments: ["magical meadow", "flower garden", "soft clouds", "enchanted landscape"]

  "curly mane unicorn":
    actions: ["prancing", "dancing", "playing", "galloping", "spreading sparkles", "nuzzling flowers"]
    environments: ["enchanted landscape", "magical meadow", "flower garden", "cherry blossom garden"]

  "forest unicorn with flower crown":
    actions: ["prancing", "exploring happily", "nuzzling flowers", "resting", "making friends", "watching butterflies"]
    environments: ["fairy forest clearing", "mushroom village", "wild orchard", "flower garden", "enchanted landscape"]

  "water unicorn with flowing mane":
    actions: ["prancing", "playing", "resting", "galloping", "exploring happily"]
    environments: ["peaceful lake shore", "magical meadow", "enchanted landscape", "flower garden"]

  "snow unicorn with fluffy coat":
    actions: ["prancing", "playing", "galloping", "resting", "exploring happily"]
    environments: ["snowy landscape", "snowy mountain", "whimsical ice castle", "northern lights sky"]


# Base quality settings (used when no audience-specific profile is selected)
_shared_quality_settings: &shared_quality_settings |
  Black and white line art coloring page, bold black lines on pure white background.
  Clean closed shapes with thick uniform outlines, ready for coloring.
  Full-bleed illustration extending naturally to edges.
  Printable 300 DPI, simple-to-medium detail for children ages 4-8.

# Audience-specific quality profiles
_quality_children: &quality_children
  prefix: |
    Children's coloring book page featuring a single main unicorn centered.
    Clean black and white line art with bold outlines:
  suffix: |
    Simple friendly face with expressive features, smooth clean surfaces.
    {SECONDARY_ELEMENTS}
    Minimal background with large open spaces for easy coloring.
    Full-bleed illustration with edges blending naturally.
    Thick bold outlines, uniform line weight throughout.
    Clear closed shapes, high contrast, pure white background with solid black lines only.
    Kid-friendly coloring book style for ages 4-7.

_quality_adults: &quality_adults
  prefix: |
    Adult coloring book page featuring detailed black and white line art.
    Main unicorn centered with intricate details:
  suffix: |
    {SECONDARY_ELEMENTS}
    Fine line details with intricate patterns throughout.
    Varied line weights creating depth and visual interest.
    Decorative background patterns and textures in pure line art.
    Complex shapes with smaller detailed areas to color.
    High contrast, pure white background with solid black lines.
    Sophisticated aesthetic for adult coloring enthusiasts.

# ==========================================
# COLORING PAGE TEMPLATES (B&W line art)
# ==========================================
coloring_page_templates:
  default:
    base_structure: "a {UNICORN}, {ACTION}. Simple {ENV} background. {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_character_profiles

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Black and white line art coloring page, cute magical unicorn, bold clean outlines, simple shapes, thick black lines on white background, no shading, printable"
    workflow_params:
      negative_prompt: "color, grayscale, shading, gradient, gray, background texture, text, watermark, logo"
      guidance_scale: "9.0"
      steps: "35"

  comfy:
    base_structure: "a {UNICORN} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_character_profiles

    workflow_params:
      # Note: Flux 2 ignores negative prompts, quality comes from positive descriptions
      "clip_g_suffix": "children's coloring book illustration, clean line art, magical unicorn style"
      "qwen_prompt": "Clean black and white lineart with bold outlines"
