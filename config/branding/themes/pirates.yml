id: pirates
label: "Pirates"

palette:
  base: ["#8b4513", "#2f4f4f", "#b8860b"]
  accents_allowed: ["#ffd700", "#ff6347"]
  forbidden_keywords: ["bright neon", "rainbow", "pastel"]

# ==========================================
# COVER TEMPLATES (colorful, full-bleed)
# ==========================================
cover_templates:
  default:
    prompt_blocks:
      subject: "a friendly cartoon pirate with treasure chest, centered composition, expressive eyes, friendly face"
      environment: "pirate ship deck, ocean waves, treasure island in background"
      tone: "adventurous, fun, swashbuckling, warm inviting colors, professional children's book quality"
      positives:
        - "high detail"
        - "vibrant colors"
        - "glossy illustration"
        - "professional children's book cover"
        - "Amazon bestseller look"
        - "warm lighting"
        - "inviting atmosphere"
      negatives:
        - "no text"
        - "no borders"
        - "no mockup"
        - "no open book"
        - "no scary"
        - "no violence"

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Vibrant children's book cover, friendly cartoon pirate with treasure chest, ship deck, ocean waves, professional glossy illustration, kid-friendly, high detail"
    workflow_params:
      negative_prompt: "text, mockup, border, scary, violence, dark, low quality, watermark"
      guidance_scale: "7.0"
      steps: "25"

  "comfy":
    prompt: "Vibrant children's book cover: friendly cartoon pirate with treasure chest on ship deck with ocean waves. Professional, glossy, kid-friendly, adventurous."

    workflow_params:
      "clip_g_suffix": "vibrant colors, professional children's book, glossy, high quality, warm inviting, adventurous"

# ==========================================
# SHARED DEFINITIONS (anchors for reuse)
# ==========================================

# Shared variables for all coloring page templates
_shared_variables: &shared_variables
  SHOT:
    - "close-up"
    - "medium"
    - "wide"
    - "action scene"
    - "group scene"

  CHARACTER:
    - "friendly cartoon pirate"
    - "pirate captain with hat"
    - "pirate captain with parrot on the shoulder"
    - "pirate captain with panther pet"
    - "pirate captain with hook"
    - "pirate captain with eye patch"
    - "pirate sailor with eye patch"
    - "pirate sailor with hook"
    - "lady pirate captain with hat"
    - "lady pirate captain with parrot on the shoulder"
    - "lady pirate captain with panther pet"
    - "lady pirate captain with hook"
    - "lady pirate captain with eye patch"
    - "lady pirate sailor with eye patch"
    - "lady pirate sailor with hook"
    - "young pirate boy"
    - "young pirate boy with hat"
    - "young pirate boy missing a tooth"
    - "young pirate girl"
    - "young pirate girl with hat"
    - "young pirate girl missing a tooth"
    - "pirate crew members with ladies and lads"
    - "parrot companion"
    - "pirate with treasure map"
    - "pirate with treasure chest"
    - "pirate with pipe"
    - "beautiful and friendly sirens"
    - "beautiful and friendly mermaids"
    - "friendly cute octopus"
    - "cute and friendly shark"
    - "cute and friendly dolphins"
    - "beautiful pirate lady"
    - "beautiful and friendly sirens ladies"
    - "beautiful and friendly sirens lads"
    - "corsair"

  ACTION:
    - "searching for treasure"
    - "pirate with treasure map"
    - "wielding swords"
    - "with old wooden guns"
    - "sailing"
    - "checking the horizon"
    - "gambling"
    - "digging for treasure"
    - "looking through telescope"
    - "celebrating"
    - "singing"
    - "climbing rigging"
    - "steering ship"
    - "perched on shoulder"
    - "flying over ship"
    - "squawking"
    - "eating crackers"
    - "sleeping and snoring"
    - "talking to mermaids"
    - "swimming with sea animals"
    - "playing in the waves with sea animals"
    - "fighting corsairs"

  ENV:
    - "pirate ship deck"
    - "pirate tavern"
    - "captain's private quarter"
    - "treasure island"
    - "beach with palm trees"
    - "ocean waves"
    - "ocean depths"
    - "treasure cave"
    - "dock filled with boats"
    - "island port and its docks"
    - "tropical island"
    - "ship mast"
    - "ship upper deck"
    - "ship lower deck"
    - "shipwreck on the beach"
    - "shipwreck deep in the water"
    - "pirate clothes an accessory shop"
    - "pirate hairdresser shop"
    - "pirate pet shop"

  FOCUS:
    - "pirate with treasure chest"
    - "full body"
    - "with ship"
    - "with parrot"
    - "with flag"

  COMPOSITION:
    - "left-facing"
    - "right-facing"
    - "front"
    - "3/4 view"
    - "action pose"

  SECONDARY_ELEMENTS:
    - "Surrounded by 2-3 small treasure chests and gold coins."
    - "A few floating seagulls and ocean spray."
    - "Scattered treasure maps and compass."
    - ""  # Sometimes no secondary elements

# Character profiles - semantic constraints
# Prevents incoherent combos like "parrot steering ship"
_shared_character_profiles: &shared_character_profiles
  # Human pirates - full range of human actions
  "friendly cartoon pirate":
    actions: ["searching for treasure", "sailing", "digging for treasure", "looking through telescope", "celebrating", "climbing rigging", "steering ship"]
    environments: ["pirate ship deck", "treasure island", "beach with palm trees", "ocean waves", "treasure cave", "dock", "tropical island"]

  "pirate captain with hat":
    actions: ["steering ship", "looking through telescope", "celebrating", "sailing", "searching for treasure"]
    environments: ["pirate ship deck", "treasure island", "dock", "ocean waves"]

  "young pirate kid":
    actions: ["searching for treasure", "digging for treasure", "celebrating", "climbing rigging", "playing"]
    environments: ["pirate ship deck", "treasure island", "beach with palm trees", "treasure cave"]

  "pirate crew member":
    actions: ["sailing", "climbing rigging", "digging for treasure", "celebrating", "steering ship"]
    environments: ["pirate ship deck", "treasure island", "beach with palm trees", "dock"]

  "pirate with treasure map":
    actions: ["searching for treasure", "looking through telescope", "digging for treasure", "celebrating"]
    environments: ["treasure island", "beach with palm trees", "treasure cave", "pirate ship deck"]

  # Parrot - bird-specific actions only!
  "parrot companion":
    actions: ["perched on shoulder", "flying over ship", "squawking", "eating crackers"]
    environments: ["pirate ship deck", "ship mast", "tropical island", "beach with palm trees"]

# Base quality settings (used when no audience-specific profile is selected)
_shared_quality_settings: &shared_quality_settings |
  Black and white line art coloring page, bold black lines on pure white background.
  Clean closed shapes with thick uniform outlines, ready for coloring.
  Full-bleed illustration extending naturally to edges.
  Printable 300 DPI, simple-to-medium detail for children ages 4-8.
  No scary elements, no violence.

# Audience-specific quality profiles
_quality_children: &quality_children
  prefix: |
    Children's coloring book page featuring a single main pirate character centered.
    Clean black and white line art with bold outlines:
  suffix: |
    Simple friendly face with expressive features, smooth clean surfaces.
    {SECONDARY_ELEMENTS}
    Minimal background with large open spaces for easy coloring.
    Full-bleed illustration with edges blending naturally.
    Thick bold outlines, uniform line weight throughout.
    Clear closed shapes, high contrast, pure white background with solid black lines only.
    Kid-friendly coloring book style for ages 4-7. No scary elements, no violence.

_quality_adults: &quality_adults
  prefix: |
    Adult coloring book page featuring detailed black and white line art.
    Main pirate character centered with intricate details:
  suffix: |
    {SECONDARY_ELEMENTS}
    Fine line details with intricate patterns throughout.
    Varied line weights creating depth and visual interest.
    Decorative background patterns and textures in pure line art.
    Complex shapes with smaller detailed areas to color.
    High contrast, pure white background with solid black lines.
    Sophisticated aesthetic for adult coloring enthusiasts.

# ==========================================
# COLORING PAGE TEMPLATES (B&W line art)
# ==========================================
coloring_page_templates:
  default:
    base_structure: "a {CHARACTER}, {ACTION}. Simple {ENV} background. {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_character_profiles

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Black and white line art coloring page, friendly cartoon pirate, bold clean outlines, simple shapes, thick black lines on white background, no shading, printable"
    workflow_params:
      negative_prompt: "color, grayscale, shading, gradient, gray, background texture, text, watermark, logo, scary, violence"
      guidance_scale: "9.0"
      steps: "35"

  comfy:
    base_structure: "a {CHARACTER} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_character_profiles

    workflow_params:
      # Note: Flux 2 ignores negative prompts, quality comes from positive descriptions
      "clip_g_suffix": "children's coloring book illustration, clean line art, friendly pirate adventure style"
      "qwen_prompt": "Clean black and white lineart with bold outlines"
