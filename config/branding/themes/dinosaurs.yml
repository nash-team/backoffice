id: dinosaurs
label: "Dinosaurs"
palette:
  base: ["#35654d", "#6a8f49", "#e0b46b"]
  accents_allowed: ["#ffd166"]
  forbidden_keywords: ["rainbow", "neon", "pastel gradient"]

# ==========================================
# COVER TEMPLATES (colorful, full-bleed)
# ==========================================
cover_templates:
  # Default template (backward compatibility)
  default:
    prompt_blocks:
      subject: "a cute but majestic T-Rex dinosaur, centered composition"
      environment: "lush jungle, tropical plants, distant volcano, other dinosaurs in background"
      tone: "adventurous, exciting, kid-friendly"
      positives: ["highly detailed", "glossy", "professional children's book cover", "Amazon bestseller style"]
      negatives: ["no text", "no mockup", "no borders", "no open book", "no low-res", "no distorted anatomy"]

  # Diffusers/SDXL - Compact prompts for CLIP tokenizer (max 77 tokens)
  diffusers:
    prompt: "Children's book cover, cute majestic T-Rex dinosaur, lush jungle, tropical plants, volcano, professional illustration, vibrant colors, glossy, kid-friendly"
    workflow_params:
      negative_prompt: "text, mockup, border, low quality, distorted anatomy, scary"
      guidance_scale: "7.0"
      steps: "25"

  # ComfyUI workflow - Concise prompts for FLUX via ComfyUI
  "comfy":
    # Main prompt (will be injected into workflow_params["54"])
    prompt: "A book cover for kids, joyful, inviting, fun with a cute majestic T-Rex dinosaur in the center
             lush jungle, tropical plants, distant volcano, other dinosaurs in background.
             A title box on the top with \"Coloring Book Dinosaurs\" written inside and wood borders.
             professional quality, vibrant colors."

    # ComfyUI workflow node parameters (mapped to node IDs in workflow JSON)
    # The provider will inject: workflow["54"]["inputs"]["text"] = prompt (from above)
    #                           workflow["47"]["inputs"]["text"] = workflow_params["47"]
    workflow_params:
      # Add any custom ComfyUI node IDs or params here
      prompt: "A book cover for kids, joyful, inviting, fun with a cute majestic T-Rex dinosaur in the center
               lush jungle, tropical plants, distant volcano, other dinosaurs in background. Kawai.
               A title box nice wood borders on the top with \"Coloring Book Dinosaurs\" written inside.
               professional quality, vibrant colors.
               The title MUST be present."

      "negative": "black and white, mockup, borders, low-res, distorted anatomy, missing title"   # Negative CLIPTextEncode node

# ==========================================
# SHARED DEFINITIONS (anchors for reuse)
# ==========================================

# Shared variables for all coloring page templates
_shared_variables: &shared_variables
  SHOT:
    - "close-up"
    - "medium"
    - "wide"
    - "silhouette"

  SPECIES:
    - "T-Rex"
    - "Triceratops"
    - "Diplodocus"
    - "Stegosaurus"
    - "Pteranodon"
    - "Ankylosaurus"
    - "Velociraptor"
    - "Brachiosaurus"
    - "Spinosaurus"
    - "Parasaurolophus"

  # All possible actions (filtered per species via species_profiles)
  ACTION:
    - "roaring"
    - "eating leaves"
    - "eating meat"
    - "running"
    - "walking"
    - "sleeping"
    - "hatching"
    - "playing"
    - "swimming"
    - "wading"
    - "flying"
    - "gliding"
    - "diving"
    - "hunting"
    - "defending"
    - "nesting"

  # All possible environments (filtered per species via species_profiles)
  ENV:
    - "lush jungle"
    - "volcanic plain"
    - "riverbank"
    - "tropical forest"
    - "desert"
    - "prehistoric landscape"
    - "mountains"
    - "sky with clouds"
    - "coastal cliffs"
    - "swamp"
    - "lake shore"

  FOCUS:
    - "head"
    - "full body"
    - "group of 2-3"
    - "parent & baby"
    - "footprint pattern"

  COMPOSITION:
    - "left-facing"
    - "right-facing"
    - "front"
    - "3/4 view"
    - "top-down"

# Shared species profiles - semantic constraints
# Prevents incoherent combos like "T-Rex flying"
_shared_species_profiles: &shared_species_profiles
  # Large Carnivores (terrestrial)
  "T-Rex":
    actions: ["roaring", "eating meat", "running", "sleeping", "hunting", "walking", "nesting"]
    environments: ["volcanic plain", "prehistoric landscape", "desert", "tropical forest"]

  "Velociraptor":
    actions: ["hunting", "running", "playing", "sleeping", "hatching", "nesting"]
    environments: ["lush jungle", "tropical forest", "desert", "prehistoric landscape"]

  # Semi-aquatic Carnivore
  "Spinosaurus":
    actions: ["swimming", "wading", "eating meat", "hunting", "walking", "sleeping"]
    environments: ["riverbank", "swamp", "lake shore", "tropical forest"]

  # Flying Reptiles
  "Pteranodon":
    actions: ["flying", "gliding", "diving", "nesting", "sleeping", "hatching"]
    environments: ["sky with clouds", "coastal cliffs", "mountains", "lake shore"]

  # Large Herbivores (long-necked)
  "Diplodocus":
    actions: ["eating leaves", "walking", "sleeping", "nesting", "drinking"]
    environments: ["lush jungle", "tropical forest", "riverbank", "prehistoric landscape"]

  "Brachiosaurus":
    actions: ["eating leaves", "walking", "sleeping", "nesting"]
    environments: ["lush jungle", "tropical forest", "lake shore", "prehistoric landscape"]

  # Armored Herbivores
  "Triceratops":
    actions: ["eating leaves", "walking", "running", "defending", "sleeping", "nesting", "playing"]
    environments: ["volcanic plain", "tropical forest", "prehistoric landscape", "riverbank"]

  "Stegosaurus":
    actions: ["eating leaves", "walking", "defending", "sleeping", "nesting"]
    environments: ["lush jungle", "tropical forest", "riverbank", "prehistoric landscape"]

  "Ankylosaurus":
    actions: ["eating leaves", "walking", "defending", "sleeping", "nesting"]
    environments: ["volcanic plain", "desert", "prehistoric landscape", "tropical forest"]

  # Duck-billed Herbivore
  "Parasaurolophus":
    actions: ["eating leaves", "walking", "running", "swimming", "nesting", "playing"]
    environments: ["riverbank", "swamp", "lake shore", "tropical forest", "lush jungle"]

# Shared quality settings
_shared_quality_settings: &shared_quality_settings |
  Black and white line art coloring page style.
  IMPORTANT: Use ONLY black lines on white background, NO colors, NO gray shading.
  Bold clean outlines, closed shapes, thick black lines.
  NO FRAME, NO BORDER around the illustration.
  Illustration extends naturally to image boundaries.
  Printable 300 DPI, simple to medium detail for kids age 4-8.
  No text, no logo, no watermark.

# ==========================================
# COLORING PAGE TEMPLATES (B&W line art)
# ==========================================
coloring_page_templates:
  # Default template (backward compatibility)
  default:
    base_structure: "Line art coloring page of a {SPECIES} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    species_profiles: *shared_species_profiles
    quality_settings: *shared_quality_settings

  # Diffusers/SDXL + ColoringBook Redmond LoRA (trigger: ColoringBookAF)
  # Prompt optimized for white background with black outlines
  diffusers:
    prompt: "ColoringBookAF, cute dinosaur, simple line art, white background, black outlines, no shading, kid-friendly coloring page"
    workflow_params:
      negative_prompt: "color, filled, shading, gradient, gray, realistic, photo, 3d, complex"
      guidance_scale: "7.5"
      steps: "30"

  # ComfyUI workflow - Ultra concise prompts optimized for FLUX via ComfyUI
  "comfy":
    base_structure: "Line art coloring page of a {SPECIES} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    species_profiles: *shared_species_profiles
    quality_settings: *shared_quality_settings

    # ComfyUI workflow node parameters (mapped to node IDs in workflow JSON)
    workflow_params:
      "prompt": "a coloring book page for kids in black and white on with {only one dinosaur|4 dinosaurs}.{eating|fighting|sleeping|playing}. For a coloring book page for kids. The kid will be able to color his favorites dinosaurs. Cute for kids. A lot of details and professional coloring book page style. Kawai."
