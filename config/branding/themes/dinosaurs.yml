id: dinosaurs
label: "Dinosaurs"

palette:
  base: ["#35654d", "#6a8f49", "#e0b46b"]
  accents_allowed: ["#ffd166"]
  forbidden_keywords: ["rainbow", "neon", "pastel gradient"]

cover_title_image: "config/branding/themes/assets/dinosaurs/cover_title.png"
cover_footer_image: "config/branding/assets/cover_footer.png"

back_cover:
  preview_pages: [27, 87]
  tagline: "Des heures de coloriage et d'aventures préhistoriques !"
  description: "Offrez à votre enfant un livre de coloriage dinosaures spécialement conçu pour les enfants dès 4 ans. Avec 100 pages de dessins simples, amusants et adaptés aux petites mains, ce livre permet de colorier tout en développant créativité et concentration."
  author: "C.Waterton"
  publisher: "Darkwaters"
  isbn: "9781234567897"  # TODO: replace with real purchased ISBN

# ==========================================
# COVER TEMPLATES (colorful, full-bleed)
# ==========================================
cover_templates:
  default:
    prompt_blocks:
      subject: "a cute but majestic T-Rex dinosaur, centered composition, expressive eyes, friendly face"
      environment: "lush jungle with tropical plants, distant volcano with gentle smoke, other friendly dinosaurs in background"
      tone: "adventurous, exciting, kid-friendly, warm inviting colors, professional children's book quality"
      positives:
        - "high detail"
        - "vibrant colors"
        - "glossy illustration"
        - "professional children's book cover"
        - "Amazon bestseller look"
        - "warm lighting"
        - "inviting atmosphere"
      negatives:
        - "no text"
        - "no borders"
        - "no mockup"
        - "no open book"
        - "no scary"
        - "no dark horror"

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Vibrant children's book cover, cute majestic T-Rex dinosaur, lush jungle, tropical plants, volcano, professional glossy illustration, kid-friendly, high detail"
    workflow_params:
      negative_prompt: "text, mockup, border, scary, dark, low quality, distorted anatomy, watermark"
      guidance_scale: "7.0"
      steps: "25"

  "comfy":
    prompt: "Vibrant children's book cover: cute majestic T-Rex dinosaur in lush jungle with tropical plants and distant volcano. Professional, glossy, kid-friendly, without text, no letters, no words."

    workflow_params:
      "clip_g_suffix": "vibrant colors, professional children's book, glossy, high quality, warm inviting"

# ==========================================
# SHARED DEFINITIONS (anchors for reuse)
# ==========================================

# Shared variables for all coloring page templates
_shared_variables: &shared_variables
  SHOT:
    - "close-up"
    - "medium shot"
    - "wide shot"

  SPECIES:
    - "T-Rex"
    - "Triceratops"
    - "Diplodocus"
    - "Stegosaurus"
    - "Pteranodon"
    - "Ankylosaurus"
    - "Velociraptor"
    - "Brachiosaurus"
    - "Spinosaurus"
    - "Parasaurolophus"

  # All possible actions (filtered per species via species_profiles)
  ACTION:
    - "roaring"
    - "eating leaves"
    - "nibbling on foliage"
    - "eating meat"
    - "running"
    - "walking"
    - "sleeping"
    - "hatching"
    - "playing"
    - "swimming"
    - "wading"
    - "flying"
    - "gliding"
    - "diving"
    - "hunting"
    - "defending"
    - "nesting"
    - "drinking at a river"
    - "walking in a group"

  # All possible environments (filtered per species via species_profiles)
  ENV:
    - "lush jungle"
    - "volcanic plain"
    - "riverbank"
    - "tropical forest"
    - "desert"
    - "prehistoric landscape"
    - "grassy plains"
    - "mountains"
    - "sky with clouds"
    - "coastal cliffs"
    - "swamp"
    - "lake shore"
    - "cave entrance"

  FOCUS:
    - "centered in frame"
    - "full body visible"
    - "with 2-3 dinosaur friends"
    - "parent with baby dinosaur"

  COMPOSITION:
    - "left-facing"
    - "right-facing"
    - "front"
    - "3/4 view"
    - "top-down"

  SECONDARY_ELEMENTS:
    - "A few prehistoric plants and ferns nearby."
    - "Small dinosaur eggs in a nest."
    - "Scattered rocks and boulders."
    - "A calm river bend with gentle ripples."
    - "Low-growing palms or shrubs framing the scene."
    - "A curious butterfly hovering near the foliage."
    - ""  # Sometimes no secondary elements

# Shared species profiles - semantic constraints
# Prevents incoherent combos like "T-Rex flying"
_shared_species_profiles: &shared_species_profiles
  # Large Carnivores (terrestrial)
  "T-Rex":
    actions: ["roaring", "eating meat", "running", "sleeping", "hunting", "walking", "nesting"]
    environments: ["volcanic plain", "prehistoric landscape", "desert", "tropical forest"]

  "Velociraptor":
    actions: ["hunting", "running", "playing", "sleeping", "hatching", "nesting"]
    environments: ["lush jungle", "tropical forest", "desert", "prehistoric landscape"]

  # Semi-aquatic Carnivore
  "Spinosaurus":
    actions: ["swimming", "wading", "eating meat", "hunting", "walking", "sleeping"]
    environments: ["riverbank", "swamp", "lake shore", "tropical forest"]

  # Flying Reptiles
  "Pteranodon":
    actions: ["flying", "gliding", "diving", "nesting", "sleeping", "hatching"]
    environments: ["sky with clouds", "coastal cliffs", "mountains", "lake shore"]

  # Large Herbivores (long-necked)
  "Diplodocus":
    actions: ["eating leaves", "nibbling on foliage", "walking", "sleeping", "nesting", "drinking at a river"]
    environments: ["lush jungle", "tropical forest", "riverbank", "grassy plains", "prehistoric landscape"]

  "Brachiosaurus":
    actions: ["eating leaves", "nibbling on foliage", "walking", "sleeping", "nesting"]
    environments: ["lush jungle", "tropical forest", "lake shore", "grassy plains", "prehistoric landscape"]

  # Armored Herbivores
  "Triceratops":
    actions: ["eating leaves", "nibbling on foliage", "walking", "running", "defending", "sleeping", "nesting", "playing"]
    environments: ["volcanic plain", "tropical forest", "grassy plains", "prehistoric landscape", "riverbank"]

  "Stegosaurus":
    actions: ["eating leaves", "nibbling on foliage", "walking", "defending", "sleeping", "nesting"]
    environments: ["lush jungle", "tropical forest", "grassy plains", "riverbank", "prehistoric landscape"]

  "Ankylosaurus":
    actions: ["eating leaves", "nibbling on foliage", "walking", "defending", "sleeping", "nesting"]
    environments: ["volcanic plain", "desert", "grassy plains", "prehistoric landscape", "tropical forest"]

  # Duck-billed Herbivore
  "Parasaurolophus":
    actions: ["eating leaves", "nibbling on foliage", "walking", "running", "swimming", "nesting", "playing"]
    environments: ["riverbank", "swamp", "lake shore", "grassy plains", "tropical forest", "lush jungle"]

# Base quality settings (used when no audience-specific profile is selected)
_shared_quality_settings: &shared_quality_settings |
  Black and white line art coloring page, bold black lines on pure white background.
  Clean closed shapes with thick uniform outlines, ready for coloring.
  Full-bleed illustration extending naturally to edges.
  Printable 300 DPI, simple-to-medium detail for children ages 4-8.

# Audience-specific quality profiles
_quality_children: &quality_children
  prefix: |
    Children's coloring book page featuring a single main dinosaur centered.
    Clean black and white line art with bold outlines:
  suffix: |
    Simple friendly face with expressive features, smooth clean surfaces.
    {SECONDARY_ELEMENTS}
    Minimal background with large open spaces for easy coloring.
    Full-bleed illustration with edges blending naturally.
    Thick bold outlines, uniform line weight throughout.
    Clear closed shapes, high contrast, pure white background with solid black lines only.
    Kid-friendly coloring book style for ages 4-7.

_quality_adults: &quality_adults
  prefix: |
    Adult coloring book page featuring detailed black and white line art.
    Main dinosaur centered with intricate details:
  suffix: |
    {SECONDARY_ELEMENTS}
    Fine line details with intricate patterns throughout.
    Varied line weights creating depth and visual interest.
    Decorative background patterns and textures in pure line art.
    Complex shapes with smaller detailed areas to color.
    High contrast, pure white background with solid black lines.
    Sophisticated aesthetic for adult coloring enthusiasts.

# ==========================================
# COLORING PAGE TEMPLATES (B&W line art)
# ==========================================
coloring_page_templates:
  default:
    base_structure: "a {SPECIES}, {ACTION}. Simple {ENV} background. {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_species_profiles

  diffusers:
    # Compact prompt for SDXL/CLIP (max 77 tokens)
    prompt: "Black and white line art coloring page, cute dinosaur, bold clean outlines, simple shapes, thick black lines on white background, no shading, printable"
    workflow_params:
      negative_prompt: "color, grayscale, shading, gradient, gray, background texture, text, watermark, logo, scary"
      guidance_scale: "9.0"
      steps: "35"

  comfy:
    base_structure: "a {SPECIES} {ACTION} in a {ENV}, {SHOT}, {FOCUS}, {COMPOSITION}."
    variables: *shared_variables
    quality_settings: *shared_quality_settings
    quality_settings_by_audience:
      children: *quality_children
      adults: *quality_adults
    species_profiles: *shared_species_profiles

    workflow_params:
      # Note: Flux 2 ignores negative prompts, quality comes from positive descriptions
      "clip_g_suffix": "children's coloring book illustration, clean line art, cute friendly dinosaur style"
      "qwen_prompt": "Clean black and white lineart with bold outlines"
